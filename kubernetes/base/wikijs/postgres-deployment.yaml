apiVersion: apps/v1
kind: Deployment
metadata:
  name: wikijs-postgres
  namespace: apps
  labels:
    app.kubernetes.io/name: wikijs-postgres
    app.kubernetes.io/part-of: minidev-platform
    app.kubernetes.io/component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wikijs-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wikijs-postgres
        app.kubernetes.io/part-of: minidev-platform
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: postgres:16.10
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: wikijs-postgres-data
