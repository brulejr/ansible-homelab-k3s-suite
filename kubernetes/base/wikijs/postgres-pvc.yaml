apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wikijs-postgres-data
  namespace: apps
  labels:
    app.kubernetes.io/name: wikijs-postgres
    app.kubernetes.io/part-of: minidev-platform
    app.kubernetes.io/component: storage
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 8Gi
