apiVersion: v1
kind: ConfigMap
metadata:
  name: apps-postgres-init
  namespace: apps
data:
  01-init-app-dbs.sh: |
    #!/bin/sh
    set -eu

    export PGPASSWORD="$POSTGRES_PASSWORD"

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname postgres <<-EOSQL
      DO \$\$
      BEGIN
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'wikijs') THEN
          CREATE ROLE wikijs LOGIN PASSWORD '${WIKIJS_DB_PASSWORD}';
        END IF;
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'gitea') THEN
          CREATE ROLE gitea LOGIN PASSWORD '${GITEA_DB_PASSWORD}';
        END IF;
      END
      \$\$;

      SELECT 'CREATE DATABASE wikijs OWNER wikijs'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'wikijs')\gexec

      SELECT 'CREATE DATABASE gitea OWNER gitea'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'gitea')\gexec
    EOSQL
