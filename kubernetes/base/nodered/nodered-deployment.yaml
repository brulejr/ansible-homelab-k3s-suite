apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodered
  namespace: apps
  labels:
    app.kubernetes.io/name: nodered
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nodered
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nodered
    spec:
      containers:
        - name: nodered
          image: nodered/node-red:4.1.8
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 1880
              name: http
          volumeMounts:
            - name: nodered-data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
      volumes:
        - name: nodered-data
          persistentVolumeClaim:
            claimName: nodered-data
