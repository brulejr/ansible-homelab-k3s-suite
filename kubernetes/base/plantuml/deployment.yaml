apiVersion: apps/v1
kind: Deployment
metadata:
  name: plantuml
  namespace: apps
  labels:
    app.kubernetes.io/name: plantuml
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: plantuml
  template:
    metadata:
      labels:
        app.kubernetes.io/name: plantuml
    spec:
      containers:
        - name: plantuml
          image: plantuml/plantuml-server:jetty-v1.2026.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
