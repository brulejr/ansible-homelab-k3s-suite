apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: default-security-headers
  namespace: traefik
spec:
  headers:
    browserXssFilter: true
    contentTypeNosniff: true
    forceSTSHeader: true
    stsIncludeSubdomains: true
    stsPreload: true
    stsSeconds: 31536000
    frameDeny: true
    referrerPolicy: "strict-origin-when-cross-origin"
