---
ansible_user: sysadm

homelab_name: brulenet
site_name: minidev

homelab_root_dir: /opt/homelab
homelab_apps_dir: "{{ homelab_root_dir }}/apps"
homelab_data_dir: "{{ homelab_root_dir }}/data"

# Active deployment mode: Ansible applies Kubernetes overlays directly.
k3s_enabled: true
k3s_channel: stable
k3s_version: ""
k3s_install_url: "https://get.k3s.io"

k3s_config_dir: /etc/rancher/k3s
k3s_config_file: "{{ k3s_config_dir }}/config.yaml"
k3s_kubeconfig_file: /etc/rancher/k3s/k3s.yaml
k3s_service_name: k3s

k3s_server_token: "a7105982474f982ddd2e33144c856f692767eb56e28479ba91400d3bf9b2910e"
k3s_write_kubeconfig_mode: "0644"

k3s_cluster_cidr: "10.42.0.0/16"
k3s_service_cidr: "10.43.0.0/16"
k3s_cluster_dns: ""
k3s_cluster_domain: "cluster.local"

k3s_disable:
  - traefik

k3s_default_local_storage_path: "{{ homelab_data_dir }}/k3s/local-path"

k3s_extra_server_args: []
k3s_kube_apiserver_args: []
k3s_kube_controller_manager_args: []
k3s_kube_scheduler_args: []
k3s_kubelet_args: []

k3s_data_dir: /var/lib/rancher/k3s

k3s_storage_local_path: "{{ homelab_data_dir }}/k3s/local-path"

k8s_apply_enabled: true
k8s_kubeconfig: "/etc/rancher/k3s/k3s.yaml"
k8s_kubectl_command: "k3s kubectl"
k8s_remote_staging_dir: "{{ homelab_apps_dir }}/k8s-manifests"

k8s_local_secret_dir: "{{ playbook_dir }}/.secrets"

postgres_admin_password_file: "{{ k8s_local_secret_dir }}/postgres_admin_password"
postgres_admin_password_length: 32

wikijs_db_password_file: "{{ k8s_local_secret_dir }}/wikijs_db_password"
wikijs_db_password_length: 32

gitea_db_password_file: "{{ k8s_local_secret_dir }}/gitea_db_password"
gitea_db_password_length: 32

# Flux/GitOps settings are currently inactive in the deployment path.
# They are retained for later use after suite/inventory separation.
flux_enabled: true
flux_git_interval: "1m0s"
flux_kustomization_interval: "10m0s"
flux_kustomization_prune: true
flux_kubeconfig: "/etc/rancher/k3s/k3s.yaml"
flux_kubectl_command: "k3s kubectl"

traefik_enabled: true
traefik_namespace: traefik
traefik_dashboard_enabled: false
traefik_entrypoints:
  - name: web
    port: 80
  - name: websecure
    port: 443
  - name: ssh
    port: 22

traefik_apps_enabled: true
traefik_apps_default_namespace: apps
traefik_apps_namespaces: []

domain_name: brulenet.dev
